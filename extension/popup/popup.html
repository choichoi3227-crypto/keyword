<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KeyLens</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 380px;
      min-height: 420px;
      background: #0F172A;
      color: #F1F5F9;
      font-family: "Inter", "Pretendard", system-ui, sans-serif;
      font-size: 13px;
    }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid #1E293B;
    }
    .logo {
      display: flex; align-items: center; gap: 8px;
      font-weight: 700; font-size: 15px;
    }
    .logo-icon {
      width: 26px; height: 26px;
      background: #2563EB;
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 900; color: #fff;
    }
    .plan-badge {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 99px;
      border: 1px solid #334155;
      color: #94A3B8;
    }

    /* Auth state */
    .auth-prompt {
      padding: 32px 20px;
      text-align: center;
    }
    .auth-prompt p { color: #94A3B8; margin-bottom: 16px; line-height: 1.5; }
    .btn-primary {
      display: inline-block;
      padding: 9px 20px;
      background: #2563EB;
      color: white;
      border: none;
      border-radius: 9px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: background 0.15s;
    }
    .btn-primary:hover { background: #1D4ED8; }
    .btn-secondary {
      display: inline-block;
      padding: 9px 20px;
      background: transparent;
      color: #94A3B8;
      border: 1px solid #334155;
      border-radius: 9px;
      font-size: 13px;
      cursor: pointer;
      width: 100%;
      margin-top: 8px;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-secondary:hover { border-color: #2563EB; color: #fff; }

    /* Search */
    .search-bar {
      padding: 12px 14px;
      border-bottom: 1px solid #1E293B;
      display: flex; gap: 8px; align-items: center;
    }
    .portal-toggle {
      display: flex;
      background: #1E293B;
      border-radius: 8px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .portal-btn {
      padding: 6px 10px;
      border: none;
      background: transparent;
      color: #64748B;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .portal-btn.active {
      background: #2563EB20;
      color: #60A5FA;
    }
    .search-input {
      flex: 1;
      background: #1E293B;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 6px 12px;
      color: #F1F5F9;
      font-size: 13px;
      outline: none;
    }
    .search-input:focus { border-color: #2563EB; }
    .search-btn {
      padding: 6px 12px;
      background: #2563EB;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }
    .search-btn:hover { background: #1D4ED8; }

    /* Results */
    .results { padding: 12px 14px; max-height: 340px; overflow-y: auto; }

    .loading {
      text-align: center; padding: 30px;
      color: #64748B; font-size: 12px;
    }
    .spin {
      display: inline-block;
      width: 20px; height: 20px;
      border: 2px solid #1E293B;
      border-top-color: #2563EB;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-bottom: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Metric rows */
    .section-title {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: #475569;
      margin-bottom: 8px;
      margin-top: 14px;
    }
    .section-title:first-child { margin-top: 0; }

    .kpi-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 6px; margin-bottom: 4px;
    }
    .kpi {
      background: #1E293B;
      border-radius: 8px;
      padding: 8px 10px;
    }
    .kpi-label { font-size: 10px; color: #64748B; margin-bottom: 2px; }
    .kpi-value { font-size: 16px; font-weight: 700; }
    .kpi-value.blue  { color: #60A5FA; }
    .kpi-value.green { color: #34D399; }
    .kpi-value.amber { color: #FBBF24; }
    .kpi-value.red   { color: #F87171; }
    .kpi-value.purple{ color: #A78BFA; }

    .metric-row {
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 5px 0;
      border-bottom: 1px solid #1E293B;
      font-size: 12px;
    }
    .metric-row:last-child { border-bottom: none; }
    .metric-label { color: #64748B; }
    .metric-value { color: #F1F5F9; font-weight: 500; }

    .bar-row {
      display: flex; align-items: center; gap: 8px;
      padding: 3px 0; font-size: 11px;
    }
    .bar-label { color: #64748B; width: 60px; flex-shrink: 0; }
    .bar-track {
      flex: 1; height: 4px;
      background: #1E293B; border-radius: 2px; overflow: hidden;
    }
    .bar-fill {
      height: 100%; border-radius: 2px;
      transition: width 0.6s ease;
    }
    .bar-num { color: #94A3B8; width: 36px; text-align: right; }

    /* Tags */
    .tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 4px; }
    .tag {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 99px;
      background: #1E293B;
      border: 1px solid #334155;
      color: #94A3B8;
      cursor: pointer;
      transition: all 0.1s;
    }
    .tag:hover { border-color: #2563EB; color: #fff; }

    /* Score pill */
    .score-pill {
      display: inline-flex; align-items: center;
      padding: 3px 10px;
      border-radius: 99px;
      font-size: 11px;
      font-weight: 700;
    }
    .score-pill.high { background: #14532d30; color: #22C55E; }
    .score-pill.mid  { background: #78350f30; color: #F59E0B; }
    .score-pill.low  { background: #7f1d1d30; color: #EF4444; }

    /* Footer */
    .footer {
      padding: 8px 14px;
      border-top: 1px solid #1E293B;
      display: flex; align-items: center;
      justify-content: space-between;
    }
    .footer-link {
      font-size: 11px; color: #475569;
      text-decoration: none;
    }
    .footer-link:hover { color: #2563EB; }
    .usage-text { font-size: 10px; color: #475569; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="logo">
      <div class="logo-icon">K</div>
      KeyLens
    </div>
    <div id="plan-badge" class="plan-badge">Free</div>
  </div>

  <!-- Auth prompt -->
  <div id="auth-prompt" class="auth-prompt" style="display:none">
    <p>KeyLens에 로그인하면<br/>검색 결과에서 바로 분석할 수 있어요.</p>
    <button class="btn-primary" onclick="openLogin()">로그인 / 회원가입</button>
    <button class="btn-secondary" onclick="openSite()">사이트에서 분석하기</button>
  </div>

  <!-- Main UI -->
  <div id="main-ui" style="display:none">
    <!-- Search -->
    <div class="search-bar">
      <div class="portal-toggle">
        <button class="portal-btn active" id="pb-google" onclick="setPortal('google')">G</button>
        <button class="portal-btn" id="pb-naver" onclick="setPortal('naver')">N</button>
      </div>
      <input class="search-input" id="kw-input" type="text" placeholder="키워드 입력..." onkeydown="if(event.key==='Enter')analyze()" />
      <button class="search-btn" onclick="analyze()">분석</button>
    </div>

    <!-- Results -->
    <div class="results" id="results">
      <div style="color:#475569; text-align:center; padding:24px; font-size:12px;">
        키워드를 입력하고 분석을 시작하세요
      </div>
    </div>

    <!-- Footer -->
    <div class="footer">
      <div class="usage-text" id="usage-text"></div>
      <a href="#" class="footer-link" onclick="openSite()">전체 분석 보기 →</a>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
